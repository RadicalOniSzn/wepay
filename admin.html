<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>WePay — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    #login { max-width:380px; margin:14vh auto 0; text-align:center; }
    #login .logo { justify-content:center; margin-bottom:24px; }
    #login input { margin:10px 0; }
    .err { color:var(--red); font-size:14px; margin-top:10px; min-height:18px; }
    .stats { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:26px; }
    .stat { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:18px; }
    .stat .n { font-size:24px; font-weight:800; font-family:'Sora'; }
    .stat .l { color:var(--muted); font-size:13px; }
    .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
    select.status { background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:7px 10px; font-family:'Inter'; }
    .gcode { font-family:'Sora'; font-weight:800; letter-spacing:2px; color:var(--cyan); }
    @media (max-width:820px){ .stats{ grid-template-columns:repeat(2,1fr);} }
  </style>
</head>
<body>
  <div id="login">
    <div class="logo"><span class="mark">W</span> WePay Admin</div>
    <input id="password" type="password" placeholder="Admin password" />
    <button class="btn btn-primary block" id="loginBtn">Log in</button>
    <div class="err" id="loginErr"></div>
  </div>

  <div class="wrap hidden" id="dashboard" style="padding-top:28px;">
    <div class="top">
      <div class="logo"><span class="mark">W</span> WePay Admin</div>
      <div>
        <button class="btn btn-ghost sm" id="refreshBtn">Refresh</button>
        <button class="btn btn-ghost sm" id="logoutBtn">Log out</button>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div id="groups"></div>
  </div>

  <script src="pricing.js"></script>
  <script>
    const CLUSTER_STATES = ['forming','full','funded','active','lapsed','cancelled'];
    let pw = '';
    const $ = (id) => document.getElementById(id);

    async function api(path, opts = {}) {
      const res = await fetch('/.netlify/functions/' + path, {
        ...opts,
        headers: { 'Content-Type':'application/json', 'x-admin-password': pw, ...(opts.headers||{}) },
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'Request failed');
      return data;
    }

    $('loginBtn').addEventListener('click', login);
    $('password').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
    async function login() {
      const candidate = $('password').value; $('loginErr').textContent = '';
      try {
        const res = await fetch('/.netlify/functions/admin-auth', {
          method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ password: candidate }),
        });
        if (!res.ok) throw new Error('Invalid password');
        pw = candidate; sessionStorage.setItem('wepay_pw', pw);
        $('login').classList.add('hidden'); $('dashboard').classList.remove('hidden'); load();
      } catch (e) { $('loginErr').textContent = e.message; }
    }
    $('logoutBtn').addEventListener('click', () => { sessionStorage.removeItem('wepay_pw'); location.reload(); });
    $('refreshBtn').addEventListener('click', load);

    async function load() {
      try { const { groups } = await api('get-groups'); renderStats(groups); renderGroups(groups); }
      catch (e) { alert(e.message); }
    }

    function renderStats(groups) {
      const members = groups.reduce((s,g)=>s+g.memberCount,0);
      const paid = groups.reduce((s,g)=>s+g.paidCount,0);
      const collected = groups.reduce((s,g)=>s+g.members.filter(m=>m.payment_status==='confirmed').reduce((a,m)=>a+m.amount,0),0);
      const fees = groups.reduce((s,g)=>s+g.members.filter(m=>m.payment_status==='confirmed').reduce((a,m)=>a+(m.amount-g.per_person),0),0);
      $('stats').innerHTML = `
        <div class="stat"><div class="n">${groups.length}</div><div class="l">Groups</div></div>
        <div class="stat"><div class="n">${members}</div><div class="l">Members</div></div>
        <div class="stat"><div class="n">${paid}</div><div class="l">Payments confirmed</div></div>
        <div class="stat"><div class="n">${WEPAY.naira(collected)}</div><div class="l">Collected</div></div>
        <div class="stat"><div class="n" style="color:var(--green)">${WEPAY.naira(fees)}</div><div class="l">Service fees</div></div>`;
    }

    function renderGroups(groups) {
      const box = $('groups');
      if (!groups.length) { box.innerHTML = '<p class="muted">No groups yet.</p>'; return; }
      box.innerHTML = '';
      const fmtDate = (iso) => iso ? new Date(iso).toLocaleDateString('en-NG',{day:'numeric',month:'short',year:'numeric'}) : null;
      groups.forEach((g) => {
        const rows = g.members.map((m) => `
          <tr>
            <td>${m.first_name} ${m.last_name}${m.is_champion?' <span class="pill forming">Champion</span>':''}<div class="muted">${m.email}</div></td>
            <td>${m.phone || '—'}</td>
            <td>${WEPAY.naira(m.amount)}</td>
            <td><span class="pill ${m.payment_status}">${m.payment_status}</span></td>
            <td>${m.payment_status==='confirmed'
              ? `<button class="btn amber sm" data-mark="${m.id}" data-to="pending">Undo</button>`
              : `<button class="btn green sm" data-mark="${m.id}" data-to="confirmed">Confirm paid</button>`}${
              (!m.is_champion && m.payment_status!=='confirmed')
                ? ` <button class="btn amber sm" data-remove="${m.id}">Remove</button>`
                : ''}</td>
          </tr>`).join('');

        // Renewal section: manage an open cycle, or offer to open one.
        let renewalHtml = '';
        const r = g.renewal;
        if (r && r.status === 'collecting') {
          const rrows = r.payments.map((p) => `
            <tr>
              <td>${p.name}<div class="muted">${p.email}</div></td>
              <td>${WEPAY.naira(p.amount)}</td>
              <td><span class="pill ${p.payment_status}">${p.payment_status}</span></td>
              <td>${p.payment_status==='confirmed'
                ? `<button class="btn amber sm" data-rmark="${p.id}" data-rto="pending">Undo</button>`
                : `<button class="btn green sm" data-rmark="${p.id}" data-rto="confirmed">Confirm paid</button>`}</td>
            </tr>`).join('');
          const allPaid = r.total > 0 && r.paidCount === r.total;
          const share = r.payments[0] ? r.payments[0].amount : 0;
          renewalHtml = `
            <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
              <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px;">
                <strong style="color:#f59e0b;">Renewal · ${WEPAY.planLabel(r.months)} · ${r.paidCount}/${r.total} paid · share ${WEPAY.naira(share)}</strong>
                <button class="btn green sm" data-apply="${r.id}" ${allPaid?'':'disabled'}>Apply renewal</button>
              </div>
              <table><thead><tr><th>Member</th><th>Share</th><th>Payment</th><th></th></tr></thead><tbody>${rrows}</tbody></table>
            </div>`;
        } else if (g.status === 'active' || g.status === 'lapsed') {
          renewalHtml = `
            <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <span class="muted">Open a renewal cycle:</span>
              <select class="status" data-renew-term="${g.id}">${[1,3,6,12].map(m=>`<option value="${m}" ${m===g.plan_months?'selected':''}>${WEPAY.planLabel(m)}</option>`).join('')}</select>
              <button class="btn btn-primary sm" data-open-renewal="${g.id}">Open renewal</button>
            </div>`;
        }

        // Editable real Starlink billing date; the member deadline is kept
        // 7 days ahead of it server-side.
        const billingVal = g.starlink_renews_on ? new Date(g.starlink_renews_on).toISOString().slice(0,10) : '';
        const billingEditor = (g.status === 'active' || g.status === 'lapsed')
          ? `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
               <span class="muted" style="font-size:13px;">Starlink billing date:</span>
               <input type="date" class="status" data-renews-date="${g.id}" value="${billingVal}" />
               <button class="btn btn-ghost sm" data-save-renews="${g.id}">Save</button>
             </div>`
          : '';

        const meta = [];
        if (g.expires_at) meta.push(`pay by ${fmtDate(g.expires_at)}`);
        if (g.starlink_renews_on) meta.push(`Starlink bills ${fmtDate(g.starlink_renews_on)}`);
        const renewsLine = meta.length ? ` · ${meta.join(' · ')}` : '';
        const el = document.createElement('div');
        el.className = 'card'; el.style.marginBottom = '16px';
        el.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:12px;">
            <div>
              <h3 style="font-size:17px;">${g.name} · <span class="gcode">${g.code}</span></h3>
              <p class="muted">${[g.venue,g.state].filter(Boolean).join(' · ')} · ${WEPAY.planLabel(g.plan_months)} · ${g.memberCount}/${g.target_size} · ${g.paidCount} paid · share ${WEPAY.naira(g.per_person)}${renewsLine}</p>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <span class="pill ${g.status}">${g.status}</span>
              <select class="status" data-group="${g.id}">${CLUSTER_STATES.map(s=>`<option value="${s}" ${s===g.status?'selected':''}>${s}</option>`).join('')}</select>
            </div>
          </div>
          <table>
            <thead><tr><th>Member</th><th>Phone</th><th>Share</th><th>Payment</th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          ${renewalHtml}${billingEditor}`;
        box.appendChild(el);
      });

      box.querySelectorAll('[data-mark]').forEach((b) => b.addEventListener('click', async () => {
        b.disabled = true;
        try { await api('mark-paid', { method:'POST', body:JSON.stringify({ memberId:Number(b.dataset.mark), status:b.dataset.to }) }); load(); }
        catch (e) { alert(e.message); b.disabled = false; }
      }));
      box.querySelectorAll('[data-remove]').forEach((b) => b.addEventListener('click', async () => {
        if (!confirm('Remove this unpaid member? This frees up their slot and cannot be undone.')) return;
        b.disabled = true;
        try { await api('remove-member', { method:'POST', body:JSON.stringify({ memberId:Number(b.dataset.remove) }) }); load(); }
        catch (e) { alert(e.message); b.disabled = false; }
      }));
      box.querySelectorAll('select.status[data-group]').forEach((s) => s.addEventListener('change', async () => {
        try { await api('update-group', { method:'POST', body:JSON.stringify({ groupId:Number(s.dataset.group), status:s.value }) }); load(); }
        catch (e) { alert(e.message); }
      }));
      box.querySelectorAll('[data-rmark]').forEach((b) => b.addEventListener('click', async () => {
        b.disabled = true;
        try { await api('mark-renewal-paid', { method:'POST', body:JSON.stringify({ paymentId:Number(b.dataset.rmark), status:b.dataset.rto }) }); load(); }
        catch (e) { alert(e.message); b.disabled = false; }
      }));
      box.querySelectorAll('[data-apply]').forEach((b) => b.addEventListener('click', async () => {
        if (!confirm('Apply this renewal? This extends the group\'s subscription.')) return;
        b.disabled = true;
        try { await api('apply-renewal', { method:'POST', body:JSON.stringify({ renewalId:Number(b.dataset.apply) }) }); load(); }
        catch (e) { alert(e.message); b.disabled = false; }
      }));
      box.querySelectorAll('[data-open-renewal]').forEach((b) => b.addEventListener('click', async () => {
        const id = b.dataset.openRenewal;
        const term = box.querySelector('[data-renew-term="' + id + '"]');
        const months = term ? Number(term.value) : 0;
        b.disabled = true;
        try { await api('open-renewal', { method:'POST', body:JSON.stringify({ groupId:Number(id), months }) }); load(); }
        catch (e) { alert(e.message); b.disabled = false; }
      }));
      box.querySelectorAll('[data-save-renews]').forEach((b) => b.addEventListener('click', async () => {
        const id = b.dataset.saveRenews;
        const inp = box.querySelector('[data-renews-date="' + id + '"]');
        const val = inp ? inp.value : '';
        if (!val) { alert('Pick a Starlink billing date first.'); return; }
        b.disabled = true;
        try { await api('update-group', { method:'POST', body:JSON.stringify({ groupId:Number(id), starlinkRenewsOn:val }) }); load(); }
        catch (e) { alert(e.message); b.disabled = false; }
      }));
    }

    const saved = sessionStorage.getItem('wepay_pw');
    if (saved) { pw = saved; $('login').classList.add('hidden'); $('dashboard').classList.remove('hidden'); load(); }
  </script>
</body>
</html>
